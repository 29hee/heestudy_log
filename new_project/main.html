<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Splix-like Prototype</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="root">
    <div class="top-bar">
      <div class="stat-group">
        <div class="stat">
          <span class="stat-label">Area</span>
          <span id="areaText">0%</span>
        </div>
        <div class="stat">
          <span class="stat-label">Best</span>
          <span id="bestText">0%</span>
        </div>
        <div class="stat">
          <span class="stat-label">State</span>
          <span id="stateText">Playing</span>
        </div>
      </div>
      <div class="stat-group">
        <div class="hint">
          1P: WASD / 방향키 &nbsp;·&nbsp; 영역 60% 채우면 승리
        </div>
        <button id="resetBtn" class="btn">
          ↻ Restart
        </button>
      </div>
    </div>
    <div class="game-wrap">
      <div class="canvas-card">
        <canvas id="gameCanvas"></canvas>
      </div>
    </div>
  </div>
  <div class="toast">
    나중에 이 GameCore를 서버/WS/멀티용으로 그대로 쓸 수 있게 구조 분리해둔 버전
  </div>
  <script src="js/main.js" defer></script>
</body>
</html>
