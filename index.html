<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Splix-like Prototype</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg: #05060a;
      --panel: #0f1720;
      --accent: #5df2c8;
      --accent2: #ffca3a;
      --danger: #ff6b6b;
      --grid: #141824;
      --text: #e5ecf5;
      --muted: #7b8190;
    }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #111827, #020617);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .root {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 10px;
      padding: 8px 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    .stat-group {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 13px;
    }

    .stat {
      padding: 4px 8px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    .stat-label {
      color: var(--muted);
      margin-right: 4px;
    }

    .btn {
      background: linear-gradient(135deg, #22c55e, #5df2c8);
      color: #020617;
      border-radius: 999px;
      border: none;
      padding: 6px 14px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.35);
    }
    .btn:active { transform: translateY(1px); box-shadow: none; }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }

    .game-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: stretch;
      min-height: 0;
    }

    .canvas-card {
      position: relative;
      background: radial-gradient(circle at top, #020617, #000000);
      border-radius: 12px;
      padding: 8px;
      max-width: 960px;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-height: 80vh;
      border-radius: 8px;
      background: #020617;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.5);
      font-size: 13px;
      color: var(--muted);
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
<div class="root">
  <div class="top-bar">
    <div class="stat-group">
      <div class="stat">
        <span class="stat-label">Area</span>
        <span id="areaText">0%</span>
      </div>
      <div class="stat">
        <span class="stat-label">Best</span>
        <span id="bestText">0%</span>
      </div>
      <div class="stat">
        <span class="stat-label">State</span>
        <span id="stateText">Playing</span>
      </div>
    </div>
    <div class="stat-group">
      <div class="hint">
        1P: WASD / 방향키 · 영역 60% 채우면 승리
      </div>
      <button id="resetBtn" class="btn">
        ↻ Restart
      </button>
    </div>
  </div>
  <div class="game-wrap">
    <div class="canvas-card">
      <canvas id="gameCanvas"></canvas>
    </div>
  </div>
</div>
<div class="toast">
  TS + 순수 GameCore 분리 구조 (서버 authoritative 전환 준비)
</div>
<script type="module" src="./src/main.ts"></script>
</body>
</html>
